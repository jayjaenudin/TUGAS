    <label>Isi Jawaban:</label>

    <button class="btn-download" onclick="generateWord()">UNDUH FILE WORD (.DOCX)</button>

<script>
    let customLogoBase64 = "";

    function updatePrompt() {
        const info = {
            nama: document.getElementById('nama').value,
            matkul: document.getElementById('matkul').value,
            topik: document.getElementById('topikAI').value,
            link: document.getElementById('linkInput').value
        };

        let promptText = `Saya adalah mahasiswa Universitas Terbuka bernama ${info.nama}. Tolong bantu saya menjawab "${info.topik}" untuk mata kuliah ${info.matkul}.`;
        
        if (info.link) {
            promptText += `\n\nHarap analisis dan gunakan referensi dari tautan berikut ini sebagai bahan tambahan: ${info.link}`;
        }

        promptText += `\n\nGunakan gaya bahasa akademik yang formal,INSTRUKSI:
1. Gunakan bahasa Indonesia formal (EYD).
2. Sertakan Dasar Hukum/Teori Ahli.
3. Struktur: Pendahuluan, Pembahasan, Kesimpulan.
4. Gaya bahasa kritis-akademis sesuai standar Modul UT, berikan analisis mendalam sesuai hukum di Indonesia, dan sertakan referensi dari berbagai sumber dan dari Buku Materi Pokok (BMP) UT.`;
        
        document.getElementById('promptPreview').value = promptText;
    }

    function copyPrompt() {
        const copyText = document.getElementById("promptPreview");
        copyText.select();
        document.execCommand("copy");
        alert("Prompt disalin!");
    }

    function saveAsHTML() {
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            if (input.tagName === 'TEXTAREA') {
                input.innerHTML = input.value;
            } else {
                input.setAttribute('value', input.value);
            }
        });
        const htmlContent = document.documentElement.outerHTML;
        const blob = new Blob([htmlContent], { type: 'text/html' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'tool_modul_adin.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function handleLogoUpload(event) {
        const reader = new FileReader();
        reader.onload = function() {
            document.getElementById('currentLogo').src = reader.result;
            customLogoBase64 = reader.result.split(',')[1];
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    async function getBase64FromUrl(url) {
        try {
            const data = await fetch(url);
            const blob = await data.blob();
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(blob); 
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
            });
        } catch (e) { return ""; }
    }

    window.onload = function() { updatePrompt(); };

    async function generateWord() {
        const { Document, Packer, Paragraph, TextRun, AlignmentType, ImageRun, ExternalHyperlink } = docx;

        const info = {
            nama: document.getElementById('nama').value, nim: document.getElementById('nim').value,
            matkul: document.getElementById('matkul').value, tutor: document.getElementById('tutor').value,
            prodi: document.getElementById('prodi').value, upbjj: document.getElementById('upbjj').value,
            isi: document.getElementById('isiDiskusi').value, topik: document.getElementById('topikAI').value,
            refLink: document.getElementById('linkInput').value
        };

        let logoData = customLogoBase64 || await getBase64FromUrl(document.getElementById('currentLogo').src);
        const content = [];
        const fontMain = "Times New Roman";

        // --- HALAMAN 1 (COVER) ---
        if (logoData) {
            try {
                content.push(new Paragraph({
                    alignment: AlignmentType.CENTER,
                    children: [new ImageRun({
                        data: Uint8Array.from(atob(logoData), c => c.charCodeAt(0)),
                        transformation: { width: 342.72, height: 140.16 }, 
                    })],
                    spacing: { before: 400, after: 600 }
                }));
            } catch(e) {}
        }

        const boldText = (t, s) => new TextRun({ text: t, bold: true, font: fontMain, size: s });

        content.push(
            new Paragraph({ alignment: AlignmentType.CENTER, children: [boldText("TUGAS TUTORIAL ONLINE (TUTON)", 32)] }),
            new Paragraph({ alignment: AlignmentType.CENTER, children: [boldText(info.matkul.toUpperCase(), 28)], spacing: { after: 1000 } }),
            new Paragraph({ alignment: AlignmentType.CENTER, children: [boldText("TUTOR PEMBIMBING: " + info.tutor.toUpperCase(), 20)], spacing: { after: 600 } }),
            new Paragraph({ alignment: AlignmentType.CENTER, children: [new TextRun({ text: "DISUSUN OLEH:", font: fontMain, size: 20 })] }),
            new Paragraph({ 
                alignment: AlignmentType.CENTER, 
                children: [boldText(info.nama, 26), new TextRun({ text: "NIM: " + info.nim, bold: true, font: fontMain, size: 26, break: 1 })],
                spacing: { after: 1200 }
            }),
            new Paragraph({
                alignment: AlignmentType.CENTER,
                children: [
                    boldText("PROGRAM STUDI " + info.prodi.toUpperCase(), 22),
                    new TextRun({ text: "UPBJJ-UT " + info.upbjj.toUpperCase(), bold: true, font: fontMain, size: 22, break: 1 }),
                    new TextRun({ text: "UNIVERSITAS TERBUKA", bold: true, font: fontMain, size: 26, break: 1 }),
                    new TextRun({ text: "2026", bold: true, font: fontMain, size: 22, break: 1 })
                ]
            })
        );

        // --- HALAMAN 2 (JAWABAN) ---
        content.push(new Paragraph({
            alignment: AlignmentType.CENTER,
            children: [boldText("JAWABAN " + info.topik.toUpperCase(), 28)],
            spacing: { before: 400, after: 400 },
            pageBreakBefore: true
        }));

        info.isi.split('\n').filter(l => l.trim() !== "").forEach(line => {
            content.push(new Paragraph({
                children: [new TextRun({ text: line, font: fontMain, size: 24 })],
                alignment: AlignmentType.JUSTIFY,
                spacing: { line: 360, after: 150 },
                indent: { firstLine: 720 }
            }));
        });

        // --- DAFTAR PUSTAKA OTOMATIS ---
        content.push(new Paragraph({ children: [boldText("DAFTAR PUSTAKA:", 24)], spacing: { before: 400, after: 200 } }));
        
        // Referensi Modul BMP
        content.push(new Paragraph({
            alignment: AlignmentType.JUSTIFY,
            indent: { left: 720, hanging: 720 },
            children: [
                new TextRun({ text: "Universitas Terbuka. (2026). ", font: fontMain, size: 24 }),
                new TextRun({ text: `Buku Materi Pokok (BMP) ${info.matkul}`, font: fontMain, size: 24, italics: true }),
                new TextRun({ text: ". Tangerang Selatan: Universitas Terbuka.", font: fontMain, size: 24 })
            ],
            spacing: { after: 100 }
        }));

        // Referensi Link Tautan (Jika Diisi)
        if(info.refLink) {
            content.push(new Paragraph({
                alignment: AlignmentType.JUSTIFY,
                indent: { left: 720, hanging: 720 },
                children: [
                    new TextRun({ text: "Referensi Online. (2026). Diakses dari: ", font: fontMain, size: 24 }),
                    new TextRun({ text: info.refLink, font: fontMain, size: 24, color: "0563C1", underline: {} })
                ]
            }));
        }

        const doc = new Document({
            sections: [{
                properties: { page: { margin: { top: 1440, bottom: 1440, left: 1440, right: 1440 } } },
                children: content
            }]
        });

        Packer.toBlob(doc).then(blob => {
            saveAs(blob, `Tugas_UT_${info.nama}.docx`);
        });
    }
</script>


</body></html>
